version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    # Python base-image major bumps are pinned intentionally (ADR-0001 +
    # PR #1 wontfix 2026-05-20). Patch/minor bumps still flow through.
    ignore:
      - dependency-name: "python"
        update-types:
          - "version-update:semver-major"
