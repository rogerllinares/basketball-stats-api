name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TESTCONTAINERS_RYUK_DISABLED: "true"

jobs:
  lint-typecheck-test:
    name: ruff + mypy + pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Phase 2.5 — Enforce offline-only ingest separation (D2.5-10, ADR-0005).
      # Fast-fail BEFORE deps install: catches the violation in seconds.
      - name: Enforce offline-only ingest separation (no-live-ingest)
        run: |
          if grep -rn "from basketball_stats.ingest" src/basketball_stats/ --exclude-dir=ingest; then
            echo "::error::Production code imports from offline-only ingest package — violates LOCKED no-live-ingest (ADR-0005)"
            exit 1
          fi
          echo "Import-ban verified: no production code touches basketball_stats.ingest.*"

      # RESEARCH §3.3 — setup-uv pinned to v8.1.0 by SHA.
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync deps
        run: uv sync --locked

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy --strict
        run: uv run mypy --strict src

      - name: Pytest
        run: uv run pytest -v

      - name: Pre-commit safety net
        run: uv run pre-commit run --all-files --show-diff-on-failure

  alembic-roundtrip:
    name: alembic upgrade head + downgrade base + upgrade head
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci_db"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync deps
        run: uv sync --locked

      - name: Alembic round-trip
        env:
          DATABASE_URL_DIRECT: postgresql://ci:ci@localhost:5432/ci_db
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head
