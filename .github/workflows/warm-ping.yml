name: Warm ping

# Defeat Render free tier's 15-min idle sleep. A recruiter clicking the live
# URL should not wait 30s for a cold start. See ADR-0002 §Consequences.
#
# 750 free instance-hours/month easily cover 24/7 warm: 24 * 31 = 744h.
#
# Cron `*/14 * * * *` — every 14 min. GitHub-hosted runners are reliable
# within a few minutes; 14 < 15 gives a 1-min safety margin.

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: GET /healthz
        env:
          LIVE_URL: ${{ vars.LIVE_URL }}
        run: |
          if [ -z "$LIVE_URL" ]; then
            echo "::warning::LIVE_URL repo variable not set yet; skipping."
            exit 0
          fi
          # -f: fail on >=400. -s: silent. -S: still show errors. -L: follow redirects.
          # -m 30: cap at 30s (cold start budget).
          curl -fsSL -m 30 "$LIVE_URL/healthz"
